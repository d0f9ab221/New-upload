<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS TOOL | ALWAYS NEW UPLOAD</title>
    <style>
        :root { --bg: #000; --acc: #fff; --border: #222; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--acc); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* Premium Glass Card */
        .card { width: 90%; max-width: 400px; padding: 40px; background: #050505; border: 1px solid var(--border); border-radius: 2px; position: relative; z-index: 1; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-weight: 200; letter-spacing: 12px; margin: 0; font-size: 22px; }
        .header p { color: #555; font-size: 10px; letter-spacing: 2px; margin-top: 8px; }

        .file-zone { border: 1px dashed #333; padding: 40px 10px; text-align: center; cursor: pointer; transition: 0.4s; color: #444; font-size: 12px; letter-spacing: 1px; }
        .file-zone:hover { border-color: #fff; color: #fff; }

        /* Progress Tracker */
        .prog-container { margin: 25px 0; display: none; }
        .prog-bar { height: 1px; background: #111; width: 100%; position: relative; }
        .prog-fill { height: 100%; width: 0%; background: #fff; box-shadow: 0 0 10px #fff; transition: 0.2s; }
        .prog-info { display: flex; justify-content: space-between; font-size: 9px; color: #666; margin-top: 10px; text-transform: uppercase; }

        .upload-btn { width: 100%; padding: 18px; background: #fff; color: #000; border: none; font-weight: 900; letter-spacing: 3px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .upload-btn:disabled { background: #111; color: #333; cursor: not-allowed; }
        .upload-btn:hover:not(:disabled) { background: #bbb; }

        #result { margin-top: 30px; display: none; border-top: 1px solid #111; padding-top: 20px; }
        .link-wrapper { background: #0a0a0a; border: 1px solid #222; display: flex; align-items: center; padding: 12px; }
        .link-text { flex: 1; font-size: 11px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .copy-btn { background: #fff; color: #000; border: none; padding: 7px 12px; font-size: 10px; font-weight: bold; cursor: pointer; margin-left: 10px; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>CS TOOL <span style="font-weight: 800; letter-spacing: 0;">PRO</span></h1>
        <p>SECURE UNIQUE FILE UPLOADER</p>
    </div>

    <input type="file" id="mainInput" onchange="filePicked()">
    <div class="file-zone" id="dropArea" onclick="document.getElementById('mainInput').click()">
        CHOOSE FILE FOR NEW UPLOAD
    </div>

    <div class="prog-container" id="pContainer">
        <div class="prog-bar"><div class="prog-fill" id="pFill"></div></div>
        <div class="prog-info">
            <span id="pStatus">Initializing...</span>
            <span id="pPercent">0%</span>
        </div>
    </div>

    <button id="upBtn" class="upload-btn" onclick="executeUpload()" disabled>Start Upload</button>

    <div id="result">
        <div style="font-size: 9px; color: #444; margin-bottom: 10px; letter-spacing: 1px;">UNIQUE LINK GENERATED:</div>
        <div class="link-wrapper">
            <div class="link-text" id="finalUrl">...</div>
            <button class="copy-btn" onclick="copyAction()">COPY</button>
        </div>
    </div>
</div>

<script>
    let currentFile = null;

    function filePicked() {
        currentFile = document.getElementById('mainInput').files[0];
        if(currentFile) {
            document.getElementById('dropArea').innerText = currentFile.name.toUpperCase();
            document.getElementById('dropArea').style.color = "#fff";
            document.getElementById('upBtn').disabled = false;
        }
    }

    async function executeUpload() {
        // Token Fragmentation
        const p1 = "ghp_xog8jCJC"; 
        const p2 = "BgFMKBzd24oeFIP";
        const p3 = "9luHIcF0b9k7v";
        const token = p1 + p2 + p3;
        
        const btn = document.getElementById('upBtn');
        const fill = document.getElementById('pFill');
        const status = document.getElementById('pStatus');
        const percent = document.getElementById('pPercent');

        btn.disabled = true;
        btn.innerText = "UPLOADING...";
        document.getElementById('pContainer').style.display = "block";

        const reader = new FileReader();
        reader.onload = async function() {
            const base64 = reader.result.split(",")[1];
            
            // UNIQUE NAME LOGIC: Current Time + Random String + File Name
            const timeTag = Math.floor(Date.now() / 1000);
            const randomID = Math.random().toString(36).substring(7);
            const uniqueName = `${timeTag}_${randomID}_${currentFile.name}`;

            status.innerText = "TRANSFERRING DATA...";
            fill.style.width = "50%";
            percent.innerText = "50%";

            try {
                const response = await fetch(
                    `https://api.github.com/repos/Faizanand/New-upload/contents/${uniqueName}`,
                    {
                        method: "PUT",
                        headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ message: "New Unique Upload", content: base64 })
                    }
                );

                if(response.ok) {
                    fill.style.width = "100%";
                    percent.innerText = "100%";
                    status.innerText = "SUCCESSFUL";
                    
                    const link = `https://raw.githubusercontent.com/Faizanand/New-upload/main/${uniqueName}`;
                    document.getElementById('finalUrl').innerText = link;
                    document.getElementById('result').style.display = "block";
                    btn.innerText = "UPLOAD FINISHED";
                } else {
                    throw new Error("API Failure");
                }
            } catch (e) {
                status.innerText = "FAILED";
                btn.disabled = false;
                btn.innerText = "RETRY";
            }
        };
        reader.readAsDataURL(currentFile);
    }

    function copyAction() {
        const link = document.getElementById('finalUrl').innerText;
        navigator.clipboard.writeText(link);
        const b = document.querySelector('.copy-btn');
        b.innerText = "COPIED";
        setTimeout(() => b.innerText = "COPY", 2000);
    }
</script>

</body>
</html>
