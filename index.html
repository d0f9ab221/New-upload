<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS TOOL | PRO DIRECT</title>
    <style>
        :root { --bg: #000; --acc: #fff; --neon: #00ff88; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--acc); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .main-card { width: 92%; max-width: 400px; background: #050505; border: 1px solid #1a1a1a; padding: 35px; border-radius: 4px; box-shadow: 0 0 40px rgba(0,255,136,0.03); }
        h1 { letter-spacing: 12px; font-weight: 200; font-size: 22px; text-align: center; margin-bottom: 30px; text-transform: uppercase; }
        
        .nav-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .nav-btn { background: transparent; border: 1px solid #222; color: #444; padding: 12px; cursor: pointer; font-size: 10px; font-weight: 900; letter-spacing: 1px; transition: 0.3s; }
        .nav-btn.active { border-color: var(--neon); color: var(--neon); background: #080808; }

        .upload-zone { border: 1px dashed #222; padding: 50px 10px; text-align: center; cursor: pointer; color: #333; font-size: 11px; margin-bottom: 25px; text-transform: uppercase; }
        .upload-zone.active { border-color: var(--neon); color: var(--neon); }

        .progress-wrap { margin: 25px 0; display: none; }
        .progress-track { height: 1px; background: #111; width: 100%; position: relative; }
        .progress-fill { height: 100%; width: 0%; background: var(--neon); box-shadow: 0 0 15px var(--neon); transition: 0.2s; }
        .progress-stats { display: flex; justify-content: space-between; font-size: 8px; color: #555; margin-top: 10px; font-weight: bold; letter-spacing: 2px; }

        .action-btn { width: 100%; padding: 20px; background: var(--acc); color: #000; border: none; font-weight: 900; letter-spacing: 5px; cursor: pointer; text-transform: uppercase; }
        .action-btn:disabled { background: #111; color: #333; cursor: not-allowed; }

        #result-area { margin-top: 30px; display: none; border-top: 1px solid #111; padding-top: 25px; }
        .link-output { background: #080808; border: 1px solid #1a1a1a; display: flex; align-items: center; padding: 15px; border-radius: 4px; }
        .link-text { flex: 1; font-size: 11px; color: var(--neon); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: bold; }
        .copy-trigger { background: var(--neon); color: #000; border: none; padding: 8px 15px; font-size: 9px; font-weight: 900; cursor: pointer; margin-left: 12px; border-radius: 2px; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>CS TOOL</h1>
    
    <div class="nav-tabs">
        <button class="nav-btn active" id="tab-all" onclick="changeMode('all')">Storage</button>
        <button class="nav-btn" id="tab-img" onclick="changeMode('img')">Gallery</button>
    </div>

    <input type="file" id="input-all" onchange="handleFile()">
    <input type="file" id="input-img" accept="image/*" onchange="handleFile()">

    <div class="upload-zone" id="drop-zone" onclick="triggerInput()">Ready to Sync Asset</div>

    <div class="progress-wrap" id="loader">
        <div class="progress-track"><div class="progress-fill" id="bar"></div></div>
        <div class="progress-stats"><span id="status">Waiting</span><span id="percent">0%</span></div>
    </div>

    <button id="submit-btn" class="action-btn" onclick="startSync()" disabled>Initialize Upload</button>

    <div id="result-area">
        <div style="font-size: 8px; color: #333; margin-bottom: 10px; letter-spacing: 2px;">PRO DIRECT LINK:</div>
        <div class="link-output">
            <div class="link-text" id="final-url">...</div>
            <button class="copy-trigger" onclick="copyUrl()">COPY</button>
        </div>
    </div>
</div>

<script>
    let currentMode = 'all', selectedFile = null;

    // TOKEN SECURED (Hex)
    const _parts = ["6768705f3841774b4a536b74", "376d53394d4d55583534674f", "6d6b6b46486e493038543056386b585a"];

    function decodeHex(h) {
        let s = '';
        for (let i = 0; i < h.length; i += 2) s += String.fromCharCode(parseInt(h.substr(i, 2), 16));
        return s;
    }

    function changeMode(m) {
        currentMode = m;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${m}`).classList.add('active');
        selectedFile = null; 
        document.getElementById('drop-zone').innerText = "Ready to Sync Asset";
        document.getElementById('drop-zone').classList.remove('active');
        document.getElementById('submit-btn').disabled = true;
    }

    function triggerInput() { document.getElementById(currentMode === 'all' ? 'input-all' : 'input-img').click(); }

    function handleFile() {
        const input = document.getElementById(currentMode === 'all' ? 'input-all' : 'input-img');
        selectedFile = input.files[0];
        if(selectedFile) {
            document.getElementById('drop-zone').innerText = selectedFile.name.toUpperCase();
            document.getElementById('drop-zone').classList.add('active');
            document.getElementById('submit-btn').disabled = false;
        }
    }

    async function startSync() {
        const token = decodeHex(_parts[0]) + decodeHex(_parts[1]) + decodeHex(_parts[2]);
        const user = "Faizanand", repo = "New-upload";
        
        const btn = document.getElementById('submit-btn');
        const bar = document.getElementById('bar');
        const status = document.getElementById('status');
        const percent = document.getElementById('percent');

        btn.disabled = true; btn.innerText = "AUTHENTICATING...";
        document.getElementById('loader').style.display = "block";

        const reader = new FileReader();
        reader.onload = async function() {
            const b64 = reader.result.split(",")[1];
            const fileName = Math.random().toString(36).substring(7) + "_" + selectedFile.name.replace(/\s+/g, '_');

            // --- REAL PROGRESS EMULATION ---
            status.innerText = "PUSHING ASSET...";
            let p = 0;
            let interval = setInterval(() => {
                if(p < 95) { p += 1; bar.style.width = p + "%"; percent.innerText = p + "%"; }
            }, 50);

            try {
                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${fileName}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "VIP_ASSET", content: b64 })
                });

                clearInterval(interval);

                if(response.ok) {
                    bar.style.width = "100%"; percent.innerText = "100%";
                    status.innerText = "SYNC COMPLETE";
                    
                    const rawUrl = `https://raw.githubusercontent.com/${user}/${repo}/main/${fileName}`;
                    
                    // DIRECT LINK JUGAD (No Phishing Page)
                    // We use a high-speed direct shortener API
                    try {
                        const shortRes = await fetch(`https://is.gd/create.php?format=simple&url=${encodeURIComponent(rawUrl)}`);
                        const directLink = await shortRes.text();
                        document.getElementById('final-url').innerText = directLink;
                    } catch {
                        document.getElementById('final-url').innerText = rawUrl;
                    }

                    document.getElementById('result-area').style.display = "block";
                    btn.innerText = "SUCCESSFUL";
                } else { throw new Error(); }
            } catch (e) {
                alert("SYNC ERROR: Check Token/Permissions.");
                btn.disabled = false; btn.innerText = "RETRY";
            }
        };
        reader.readAsDataURL(selectedFile);
    }

    function copyUrl() {
        const url = document.getElementById('final-url').innerText;
        navigator.clipboard.writeText(url);
        const copyBtn = document.querySelector('.copy-trigger');
        copyBtn.innerText = "DONE";
        setTimeout(() => copyBtn.innerText = "COPY", 2000);
    }
</script>
</body>
</html>
