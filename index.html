<!DOCTYPE html>
<html>
<head>
  <title>Heavy Uploader</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a2e, #000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 90%;
      max-width: 420px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      box-shadow: 0 0 25px rgba(0,255,255,0.2);
      text-align: center;
      animation: pop 0.6s ease;
    }

    @keyframes pop {
      from {transform: scale(0.8); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }

    h2 {
      margin-bottom: 20px;
      color: #00ffe1;
      text-shadow: 0 0 10px #00ffe1;
    }

    input[type="file"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 2px dashed #00ffe1;
      background: transparent;
      color: white;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #00ffe1, #0077ff);
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 15px #00ffe1;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #00ffe1;
    }

    #status {
      margin-top: 15px;
      font-size: 14px;
      word-break: break-word;
    }

    a {
      color: #00ff88;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>⚡ Heavy File Uploader</h2>

  <input type="file" id="file">

  <button onclick="uploadFile()">Upload Now</button>

  <p id="status"></p>

</div>

<script>
async function uploadFile() {

const token = "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";
const username = "Faizanand";
const repo = "Fileuploader";

const fileInput = document.getElementById("file");
const file = fileInput.files[0];

if(!file){
alert("File select kro");
return;
}

document.getElementById("status").innerHTML = "Uploading... ⏳";

const reader = new FileReader();

reader.onload = async function() {

const base64 = reader.result.split(",")[1];

const response = await fetch(
`https://api.github.com/repos/${username}/${repo}/contents/uploads/${file.name}`,
{
method: "PUT",
headers: {
"Authorization": `token ${token}`,
"Content-Type": "application/json"
},
body: JSON.stringify({
message: "upload file",
content: base64
})
}
);

if(response.ok){

const link =
`https://cdn.jsdelivr.net/gh/${username}/${repo}/uploads/${file.name}`;

document.getElementById("status").innerHTML =
`✅ Uploaded Successfully<br><br>
<a href="${link}" target="_blank">${link}</a>`;

}else{
document.getElementById("status").innerHTML = "❌ Upload Failed";
}

};

reader.readAsDataURL(file);

}
</script>

</body>
</html>
