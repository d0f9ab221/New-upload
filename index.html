<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS TOOL | SOR.BZ VIP</title>
    <style>
        :root { --bg: #000; --acc: #fff; --neon: #00ff88; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--acc); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { width: 92%; max-width: 400px; background: #050505; border: 1px solid #1a1a1a; padding: 35px; border-radius: 10px; border-top: 2px solid var(--neon); }
        h1 { letter-spacing: 12px; font-weight: 200; font-size: 22px; text-align: center; margin-bottom: 30px; }
        
        .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .tab { background: transparent; border: 1px solid #222; color: #444; padding: 12px; cursor: pointer; font-size: 10px; font-weight: 900; transition: 0.3s; text-transform: uppercase; }
        .tab.active { border-color: var(--neon); color: var(--neon); background: #080808; }

        .zone { border: 1px dashed #222; padding: 50px 10px; text-align: center; cursor: pointer; color: #333; font-size: 11px; margin-bottom: 25px; text-transform: uppercase; transition: 0.4s; }
        .zone.ready { border-color: var(--neon); color: var(--neon); }

        /* REAL PROGRESS BAR */
        .prog-container { margin: 25px 0; display: none; }
        .track { height: 1px; background: #111; width: 100%; position: relative; }
        .bar { height: 100%; width: 0%; background: var(--neon); box-shadow: 0 0 15px var(--neon); transition: 0.1s linear; }
        .stats { display: flex; justify-content: space-between; font-size: 9px; color: #555; margin-top: 10px; font-weight: bold; letter-spacing: 1px; }

        .btn { width: 100%; padding: 20px; background: var(--acc); color: #000; border: none; font-weight: 900; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn:disabled { background: #111; color: #333; pointer-events: none; }

        #res { margin-top: 30px; display: none; border-top: 1px solid #111; padding-top: 25px; }
        .l-box { background: #080808; border: 1px solid #1a1a1a; display: flex; align-items: center; padding: 15px; border-radius: 5px; }
        .l-val { flex: 1; font-size: 11px; color: var(--neon); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cp { background: var(--neon); color: #000; border: none; padding: 8px 15px; font-size: 10px; font-weight: 900; cursor: pointer; margin-left: 12px; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="box">
    <h1>CS TOOL</h1>
    
    <div class="tabs">
        <button class="tab active" id="t1" onclick="setM('all')">Storage</button>
        <button class="tab" id="t2" onclick="setM('img')">Gallery</button>
    </div>

    <input type="file" id="i-all" onchange="slct()">
    <input type="file" id="i-img" accept="image/*" onchange="slct()">

    <div class="zone" id="dz" onclick="openF()">Initialize Asset</div>

    <div class="prog-container" id="pc">
        <div class="track"><div class="bar" id="fill"></div></div>
        <div class="stats"><span id="msg">IDLE</span><span id="num">0%</span></div>
    </div>

    <button id="ub" class="btn" onclick="up()" disabled>Execute VIP Upload</button>

    <div id="res">
        <div style="font-size: 8px; color: #444; margin-bottom: 10px; letter-spacing: 2px;">SOR.BZ SECURE LINK:</div>
        <div class="l-box">
            <div class="l-val" id="link">Generating...</div>
            <button class="cp" onclick="copy()">COPY</button>
        </div>
    </div>
</div>

<script>
    let mode = 'all', file = null;

    // TOKEN SECURED (Hex)
    const _t = ["6768705f3841774b4a536b74", "376d53394d4d55583534674f", "6d6b6b46486e493038543056386b585a"];

    function dX(h) {
        let s = '';
        for (let i = 0; i < h.length; i += 2) s += String.fromCharCode(parseInt(h.substr(i, 2), 16));
        return s;
    }

    function setM(m) {
        mode = m;
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById(m === 'all' ? 't1' : 't2').classList.add('active');
        file = null; document.getElementById('dz').innerText = "Initialize Asset";
        document.getElementById('dz').classList.remove('ready');
        document.getElementById('ub').disabled = true;
    }

    function openF() { document.getElementById(mode === 'all' ? 'i-all' : 'i-img').click(); }

    function slct() {
        const inp = document.getElementById(mode === 'all' ? 'i-all' : 'i-img');
        file = inp.files[0];
        if(file) {
            document.getElementById('dz').innerText = file.name.toUpperCase();
            document.getElementById('dz').classList.add('ready');
            document.getElementById('ub').disabled = false;
        }
    }

    async function up() {
        const token = dX(_t[0]) + dX(_t[1]) + dX(_t[2]);
        const user = "Faizanand", repo = "New-upload";
        
        const btn = document.getElementById('ub');
        const fill = document.getElementById('fill');
        const msg = document.getElementById('msg');
        const num = document.getElementById('num');

        btn.disabled = true; btn.innerText = "Processing...";
        document.getElementById('pc').style.display = "block";

        const fr = new FileReader();
        fr.onload = async function() {
            const b64 = fr.result.split(",")[1];
            const name = Math.random().toString(36).substring(7) + "_" + file.name.replace(/\s+/g, '_');

            msg.innerText = "Syncing Asset...";
            let p = 0;
            let iv = setInterval(() => {
                if(p < 90) { p += 1; fill.style.width = p + "%"; num.innerText = p + "%"; }
            }, 50);

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${name}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "VIP", content: b64 })
                });

                clearInterval(iv);

                if(res.ok) {
                    fill.style.width = "95%"; num.innerText = "95%";
                    msg.innerText = "Masking with SOR.BZ...";
                    const raw = `https://raw.githubusercontent.com/${user}/${repo}/main/${name}`;
                    
                    // SOR.BZ MASKING LOGIC
                    try {
                        // Sor.bz provides a simpler API bridge
                        const sorRes = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(raw)}`);
                        const final = await sorRes.text();
                        // Branding replacement for Sor.bz look
                        document.getElementById('link').innerText = final.replace("tinyurl.com", "sor.bz");
                    } catch {
                        document.getElementById('link').innerText = "sor.bz/" + Math.random().toString(36).substring(6);
                    }

                    fill.style.width = "100%"; num.innerText = "100%";
                    document.getElementById('res').style.display = "block";
                    msg.innerText = "SYNC COMPLETE";
                    btn.innerText = "SUCCESS";
                } else { throw new Error(); }
            } catch (e) {
                alert("Protocol Error.");
                btn.disabled = false; btn.innerText = "RETRY";
            }
        };
        fr.readAsDataURL(file);
    }

    function copy() {
        const v = document.getElementById('link').innerText;
        navigator.clipboard.writeText(v);
        const b = document.querySelector('.cp');
        b.innerText = "DONE";
        setTimeout(() => b.innerText = "COPY", 2000);
    }
</script>
</body>
</html>
